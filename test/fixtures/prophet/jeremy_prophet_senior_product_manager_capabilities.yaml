reducer_prompt: Given two or more Corus files containing contexts arrays, reduce structurally similar context objects into
  shared capabilities. Compare skill, outcome, relationship, and recipient while using origin only for provenance, transferability,
  and situational constraints. A capability is a coordination object over context references; it does not belong inherently
  to a person or a job. Preserve whether each context is demonstrated, requested, observed, or otherwise directed. Do not
  group contexts solely because they share keywords. Group them only when they describe a meaningfully transferable way
  of producing a class of outcomes for a class of recipients. Preserve exact job-description phrases as lexical requirements
  and allow candidate-side language to vary only when the evidence supports the translation. Output capability groups, context
  memberships, alignment strengths, lexical coverage, gaps, confidence, and constraints.
reducer_policy:
  grouping_fields:
  - skill
  - outcome
  - relationship
  - recipient
  provenance_field: origin
  capabilities_belong_to_neither_side: true
  preserve_direction: true
  preserve_exact_job_language: true
  keyword_match_is_insufficient: true
  resume_language_must_be_evidence_supported: true
