schema_version: corus.program.v1
program_id: prophet-fixture-program-golden
objective: Represent and replay the existing Prophet capability proof through recoverable Corus program state.
constraints:
  - Do not make live provider calls during replay.
  - Preserve the existing Prophet fixture inputs, provider boundaries, artifacts, and validation rules.
  - Do not redesign provider adapters, introduce LangGraph, add semantic retrieval, build UI, or extract a separate Domain package.
object_schemas:
  schema_version: corus.program_object_schemas.v1
  objects:
    context: corus.context.v1
    capability_reduction: corus.capability_reduction.v1
    capability_validation: corus.validation.v1
    capability_projection: corus.projection.v1
    generation_record: corus.generation_record.v1
    process_definition: corus.process_definition.v1
    transition_event: corus.transition_event.v1
process_definitions:
  - id: structured_context_preservation
    required_inputs:
      - subject_source
      - target_source
    expected_outputs:
      - subject_context
      - target_context
    allowed_start_statuses:
      - ready
    allowed_return_statuses:
      - completed_valid_output
    required_artifact_refs:
      - subject_context
      - target_context
    transitions:
      completed_valid_output:
        target_process_id: capability_reduction
        target_start_status: completed_valid_output
  - id: capability_reduction
    required_inputs:
      - subject_context
      - target_context
    expected_outputs:
      - capability_reduction
    allowed_start_statuses:
      - completed_valid_output
    allowed_return_statuses:
      - completed_valid_output
      - failed
      - architect_required
    required_artifact_refs:
      - capability_reduction
    transitions:
      completed_valid_output:
        target_process_id: capability_validation
        target_start_status: completed_valid_output
      failed:
        target_process_id: null
        target_start_status: null
      architect_required:
        target_process_id: null
        target_start_status: null
  - id: capability_validation
    required_inputs:
      - capability_reduction
      - subject_context
      - target_context
    expected_outputs:
      - capability_validation
    allowed_start_statuses:
      - completed_valid_output
    allowed_return_statuses:
      - passed
      - revise
      - failed
      - architect_required
    required_artifact_refs:
      - capability_validation
    transitions:
      passed:
        target_process_id: projection
        target_start_status: passed
      revise:
        target_process_id: capability_reduction
        target_start_status: completed_valid_output
      failed:
        target_process_id: null
        target_start_status: null
      architect_required:
        target_process_id: null
        target_start_status: null
  - id: projection
    required_inputs:
      - capability_validation
      - capability_reduction
    expected_outputs:
      - capability_projection
    allowed_start_statuses:
      - passed
    allowed_return_statuses:
      - completed_valid_output
    required_artifact_refs:
      - capability_projection
    transitions:
      completed_valid_output:
        target_process_id: capability_admission
        target_start_status: completed_valid_output
  - id: capability_admission
    required_inputs:
      - capability_projection
      - capability_validation
      - baseline
    expected_outputs:
      - author_decision
    allowed_start_statuses:
      - completed_valid_output
      - awaiting_author
    allowed_return_statuses:
      - awaiting_author
      - admitted
      - blocked
    required_artifact_refs:
      - author_review
    transitions:
      awaiting_author:
        target_process_id: capability_admission
        target_start_status: awaiting_author
      admitted:
        target_process_id: null
        target_start_status: null
      blocked:
        target_process_id: null
        target_start_status: null
