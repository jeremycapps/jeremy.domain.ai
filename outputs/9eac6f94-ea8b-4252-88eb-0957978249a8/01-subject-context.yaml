    generation_prompt: "Read the supplied source as a ledger of bounded claims.
      Convert each independently evidenced claim into a context object with
      exactly five semantic coordinates: origin, skill, outcome, relationship,
      and recipient. Origin identifies when and where the claim is situated and
      which evidence source supports it. Skill describes how the outcome was
      achieved or is expected to be achieved. Outcome describes the change
      achieved or requested. Relationship explains why that outcome matters to
      the recipient. Recipient identifies who or what receives the outcome.
      Preserve exact source language where lexical fidelity matters, especially
      for job descriptions. Do not generate capabilities inside this file.
      Capabilities are produced later by a reducer operating across context
      objects from any source type. Preserve evidence status, attribution
      limits, uncertainty, and source references. Do not optimize the source
      claims for a resume or job fit during context generation."
    capability_reducer_prompt: Given two or more Corus files containing contexts
      arrays, reduce structurally similar context objects into shared
      capabilities. Compare skill, outcome, relationship, and recipient while
      using origin only for provenance, transferability, and situational
      constraints. A capability is a coordination object over context
      references; it does not belong inherently to a person or a job. Preserve
      whether each context is demonstrated, requested, observed, or otherwise
      directed. Do not group contexts solely because they share keywords. Group
      them only when they describe a meaningfully transferable way of producing
      a class of outcomes for a class of recipients. Preserve exact
      job-description phrases as lexical requirements and allow candidate-side
      language to vary only when the evidence supports the translation. Output
      capability groups, context memberships, alignment strengths, lexical
      coverage, gaps, confidence, and constraints.
